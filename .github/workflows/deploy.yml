name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # 1. Build and Push Docker Images
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ghcr.io/rafeek209/university-project-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/rafeek209/university-project-frontend:latest

  # 2. Deploy to Oracle VM Server
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Pull latest images
            docker pull ghcr.io/rafeek209/university-project-backend:latest
            docker pull ghcr.io/rafeek209/university-project-frontend:latest
            
            # Restart the application
            docker-compose down
            docker-compose up -d
            
            # Clean up old unused images
            docker image prune -f