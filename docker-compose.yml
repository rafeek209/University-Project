version: '3.8'
services:
  backend:
    image: ghcr.io/rafeek209/university-project-backend:latest
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/pathport
    depends_on:
      - mongodb

  frontend:
    image: ghcr.io/rafeek209/university-project-frontend:latest
    ports:
      - "80:80"

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      # Mount your CSV files here so a script can import them on startup
      - ./devops/mongo-init:/docker-entrypoint-initdb.d/

volumes:
  mongo_data: